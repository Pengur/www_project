<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GMP – Game Master Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>

<body>


  <div class="navbar-main">
    <div class="title">GMP - Game Master Panel</div>
    <div class="cam-btn">
        <button class="btn">cam1</button>
        <button class="btn">cam2</button>
        <button class="btn">cam3</button>
      </div>
  </div>

  
<div class="layout">

    <div class="left-panel">
      <div class="box">
        <div class="box-title">Alerty</div>
        <div class="box-content"></div>
      </div>
    </div>
    <div class="center-panel">
      <div class="camera">
        <video width="740" height="390" controls preload="metadata">
          <source src="" type="video/mp4">
        </video>
      </div>
    </div>
    <div class="right-panel">
      <div class="box">
        <div class="box-title">Podpowiedzi</div>
        <div class="box-content"></div>
      </div>
    </div>
</div>
</div>
<div class="timer-btn">
      <div id="timer"></div>
      <div class="main-buttons">
          <button class="btn">Zakończ Gre</button>
          <button class="btn">Włącz/Wyłącz Mikrofon</button>
          <button class="btn">Zgłoś Problem</button>
          <button class="btn">Wyślij</button>
        </div>
    </div>
  
<div class="notes">
    <div class="notes-title">notatnik</div>
    <div class="notes-content" contenteditable="true"></div>
  </div>

</body>

</html>
